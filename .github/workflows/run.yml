name: ATOK 24/7 Bot

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */6 * * *' # গিটহাবের টাইমআউট এড়াতে প্রতি ৬ ঘন্টা পর পর রিস্টার্ট নেবে

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests urllib3
    - name: Run Bot
      run: python main.py
